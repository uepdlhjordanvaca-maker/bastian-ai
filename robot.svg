<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definición de efectos de brillo holográfico -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="laser-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo espacial oscuro simétrico -->
  <rect width="100%" height="100%" fill="#010206"/>
  <circle cx="250" cy="250" r="220" fill="url(#glow)"/>

  <!-- Anillos HUD del sistema perimetral -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="250" cy="250" r="190" fill="none" stroke="#0066ff" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="10 15"/>
  <circle cx="250" cy="250" r="175" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="1 8"/>

  <!-- El Núcleo de Red Central (Navegación de IA) -->
  <g filter="url(#laser-glow)">
    <!-- Polígono del procesador cuántico central -->
    <polygon points="250,110 370,180 370,320 250,390 130,320 130,180" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-opacity="0.85"/>
    
    <!-- Líneas de interconexión de datos internas -->
    <line x1="250" y1="110" x2="250" y2="390" stroke="#0066ff" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="130" y1="180" x2="370" y2="320" stroke="#0066ff" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="130" y1="320" x2="370" y2="180" stroke="#0066ff" stroke-width="1.5" stroke-opacity="0.6"/>
    
    <!-- Esferas de energía nodales -->
    <circle cx="250" cy="250" r="30" fill="none" stroke="#00f0ff" stroke-width="3" stroke-opacity="0.9"/>
    <circle cx="250" cy="250" r="8" fill="#00f0ff"/>
    <circle cx="250" cy="110" r="5" fill="#00f0ff"/>
    <circle cx="370" cy="180" r="5" fill="#00f0ff"/>
    <circle cx="370" cy="320" r="5" fill="#00f0ff"/>
    <circle cx="250" cy="390" r="5" fill="#00f0ff"/>
    <circle cx="130" cy="320" r="5" fill="#00f0ff"/>
    <circle cx="130" cy="180" r="5" fill="#00f0ff"/>
  </g>

  <!-- Gráficas perimetrales angulares tácticas -->
  <path d="M 90 200 A 170 170 0 0 1 200 90" fill="none" stroke="#00f0ff" stroke-width="4" stroke-opacity="0.7"/>
  <path d="M 410 300 A 170 170 0 0 1 300 410" fill="none" stroke="#00f0ff" stroke-width="4" stroke-opacity="0.7"/>
</svg>
