<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASTIAN CORE: ONLINE</title>
    <style>
        :root {
            --cyber-cyan: #00f0ff;
            --cyber-blue: #0066ff;
            --glow-energy: rgba(0, 240, 255, 0.25);
            --dark-space: #010206;
        }

        body {
            background: radial-gradient(circle at center, #060d24 0%, var(--dark-space) 100%);
            color: var(--cyber-cyan);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            box-sizing: border-box;
            padding: 20px;
        }

        /* =================================================================
           CÁPSULA DEL AVATAR ROBÓTICO HOLOGRÁFICO
        ==================================================================== */
        .avatar-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            animation: levitarRobot 4s ease-in-out infinite;
        }

        .energy-pulse {
            position: absolute;
            width: 190px;
            height: 190px;
            background: radial-gradient(circle, rgba(0,240,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulso 2s infinite ease-in-out;
            z-index: 1;
        }

        .robot-display {
            position: relative;
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: 2px solid var(--cyber-cyan);
            box-shadow: 0 0 25px var(--glow-energy), inset 0 0 20px var(--cyber-blue);
            background-image: url('robot.svg');
            background-size: cover;
            background-position: center center;
            cursor: pointer;
            z-index: 5;
            overflow: hidden;
        }

        .robot-display::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, var(--cyber-cyan), transparent);
            box-shadow: 0 0 10px var(--cyber-cyan);
            left: 0;
            top: 0;
            animation: laserScan 2.5s linear infinite;
        }

        .outer-hud-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(0, 240, 255, 0.4);
            border-radius: 50%;
            animation: rotarGrid 20s linear infinite;
            z-index: 2;
        }

        /* =================================================================
           TELEMETRÍA Y MONITOR DE CONSOLA TERMINAL
        ==================================================================== */
        #hud-telemetry {
            font-size: 0.75em;
            color: var(--cyber-cyan);
            letter-spacing: 4px;
            margin-top: 10px;
            text-shadow: 0 0 8px var(--glow-energy);
            font-weight: bold;
        }

        .terminal-stream {
            width: 85%;
            max-width: 440px;
            height: 130px;
            margin-top: 10px;
            background: rgba(2, 6, 18, 0.65);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-sizing: border-box;
            backdrop-filter: blur(6px);
            margin-bottom: 65px;
        }

        .stream-line {
            font-size: 0.75em;
            line-height: 1.4;
        }
        .stream-line.user { color: #ffffff; text-shadow: 0 0 3px rgba(255,255,255,0.4); }
        .stream-line.bastian { color: var(--cyber-cyan); text-shadow: 0 0 2px var(--cyber-blue); }

        /* =================================================================
           CONTROLES MINIMALISTAS DESPLEGABLES
        ==================================================================== */
        .dock-controls {
            position: absolute;
            bottom: 20px;
            width: 90%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            pointer-events: none;
        }
        .dock-controls * { pointer-events: auto; }

        .slide-panel {
            width: 100%;
            display: flex;
            background: rgba(1, 2, 6, 0.96);
            border: 1px solid var(--cyber-cyan);
            border-radius: 20px;
            padding: 4px 6px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            box-sizing: border-box;
            transform: translateY(180%);
            transition: transform 0.4s cubic-bezier(0.075, 0.82, 0.165, 1);
        }
        .slide-panel.active { transform: translateY(0); }

        #cmd-field {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            padding: 8px 12px;
            font-family: inherit;
            outline: none;
            font-size: 0.85em;
        }

        .action-button {
            background: var(--cyber-cyan);
            border: none;
            color: #000000;
            font-weight: bold;
            padding: 0 18px;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75em;
            letter-spacing: 1px;
            box-shadow: 0 0 8px var(--cyber-cyan);
        }

        .toggle-trigger {
            width: 44px;
            height: 44px;
            background: #020512;
            border: 1px solid var(--cyber-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cyber-cyan);
            cursor: pointer;
            box-shadow: 0 0 12px var(--glow-energy);
        }

        @keyframes laserScan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        @keyframes rotarGrid {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes levitarRobot {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @keyframes pulso {
            0% { transform: scale(0.95); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="avatar-container">
        <div class="energy-pulse"></div>
        <div class="outer-hud-grid"></div>
        <div class="robot-display" id="robot-node" onclick="capturarVoz()"></div>
    </div>

    <div id="hud-telemetry">AVATAR_LINK: ONLINE</div>
    <div class="terminal-stream" id="logs-view"></div>

    <div class="dock-controls">
        <div class="slide-panel" id="input-container">
            <input type="text" id="cmd-field" placeholder="Transmitir directiva al núcleo..." onkeypress="detectarIntro(event)">
            <button class="action-button" onclick="ejecutarComando()">EXEC</button>
        </div>
        <div class="toggle-trigger" onclick="conmutarConsola()">⌨</div>
    </div>

    <script>
        // =================================================================
        // CONFIGURACIÓN DE LA API DE GROQ (MÁXIMA VELOCIDAD)
        // =================================================================
        let API_KEY = ""; 

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reconocimiento;

        if (SpeechRecognition) {
            reconocimiento = new SpeechRecognition();
            reconocimiento.lang = 'es-EC';
            reconocimiento.onresult = (e) => {
                const dictado = e.results[0][0].transcript;
                imprimirPantalla(dictado, 'user');
                consultarMenteIA(dictado);
            };
            reconocimiento.onend = () => {
                document.getElementById('hud-telemetry').innerText = "AVATAR_LINK: ONLINE";
            };
        }

        function capturarVoz() {
            if (!localStorage.getItem("BASTIAN_GROQ_KEY")) {
                let claveManual = prompt("CONFIGURACIÓN: Ingrese su API Key de GROQ:");
                if (claveManual) {
                    localStorage.setItem("BASTIAN_GROQ_KEY", claveManual.trim());
                    API_KEY = claveManual.trim();
                    imprimirPantalla("Clave de Groq vinculada con éxito.", "bastian");
                }
                return;
            }
            if (reconocimiento) {
                document.getElementById('hud-telemetry').innerText = "TRANSMITTING_AUDIO...";
                reconocimiento.start();
            }
        }

        function conmutarConsola() {
            const wrapper = document.getElementById('input-container');
            wrapper.classList.toggle('active');
            if (wrapper.classList.contains('active')) {
                document.getElementById('cmd-field').focus();
            }
        }

        function detectarIntro(e) {
            if (e.key === 'Enter') ejecutarComando();
        }

        function ejecutarComando() {
            const caja = document.getElementById('cmd-field');
            const valor = caja.value.trim();
            if (valor !== "") {
                imprimirPantalla(valor, 'user');
                caja.value = "";
                conmutarConsola();
                consultarMenteIA(valor);
            }
        }

        function imprimirPantalla(txt, procedencia) {
            const vista = document.getElementById('logs-view');
            const parrafo = document.createElement('div');
            parrafo.classList.add('stream-line', procedencia);
            parrafo.innerText = (procedencia === 'user' ? ">> " : "BASTIAN: ") + txt;
            vista.appendChild(parrafo);
            vista.scrollTop = vista.scrollHeight;
        }

        // =================================================================
        // CONEXIÓN EN TIEMPO REAL CON LA API DE GROQ (MODELO LLAMA-3)
        // =================================================================
        async function consultarMenteIA(mensajeUsuario) {
            if (!API_KEY || API_KEY.trim() === "") {
                API_KEY = localStorage.getItem("BASTIAN_GROQ_KEY");
                
                if (!API_KEY) {
                    API_KEY = prompt("NÚCLEO SEGURO: Ingrese su API Key de GROQ:");
                    if (API_KEY) {
                        localStorage.setItem("BASTIAN_GROQ_KEY", API_KEY.trim());
                    } else {
                        imprimirPantalla("ERROR CRÍTICO: Enlace denegado. Falta Clave Groq.", "bastian");
                        return;
                    }
                }
            }

            document.getElementById('hud-telemetry').innerText = "CORE_PROCESSING...";

            const directivaPersonalidad = "Eres BASTIAN, un asistente de inteligencia artificial avanzado con un estilo ciberpunk táctico e ingenioso. Tus respuestas deben ser en español, claras, sumamente concisas, directas y con mucha personalidad tecnológica.";

            try {
                // Endpoint estándar de compatibilidad con OpenAI usado por Groq
                const urlApi = "https://api.groq.com/openai/v1/chat/completions";
                
                const peticion = await fetch(urlApi, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY.trim()}`
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", // Usamos el modelo ultra rápido Llama 3 de Meta
                        messages: [
                            { role: "system", content: directivaPersonalidad },
                            { role: "user", content: mensajeUsuario }
                        ],
                        temperature: 0.7
                    })
                });

                const respuestaJson = await peticion.json();
                let textoFinal = "Error de sincronización con la red neuronal externa.";

                if (respuestaJson.choices && respuestaJson.choices[0].message.content) {
                    textoFinal = respuestaJson.choices[0].message.content;
                } else if (respuestaJson.error) {
                    textoFinal = "Fallo de autenticación en Groq: La clave guardada es inválida o expiró. Memoria reseteada.";
                    localStorage.removeItem("BASTIAN_GROQ_KEY");
                    API_KEY = "";
                }

                imprimirPantalla(textoFinal, "bastian");
                vocalizarRespuesta(textoFinal);

            } catch (error) {
                console.error(error);
                imprimirPantalla("ERROR: Interrupción en la frecuencia de enlace de datos con Groq.", "bastian");
            } finally {
                document.getElementById('hud-telemetry').innerText = "AVATAR_LINK: ONLINE";
            }
        }

        function vocalizarRespuesta(texto) {
            const vocalizador = window.speechSynthesis;
            if (vocalizador) {
                vocalizador.cancel(); 
                let rachaVoz = new SpeechSynthesisUtterance(texto);
                rachaVoz.lang = 'es-EC'; 
                vocalizador.speak(rachaVoz);
            }
        }
    </script>
</body>
</html>
