<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASTIAN AI</title>
    <style>
        body {
            background-color: #050510;
            color: #00e5ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Círculo animado estilo Jarvis */
        .core {
            width: 180px;
            height: 180px;
            border: 4px dashed #00e5ff;
            border-radius: 50%;
            animation: rotar 4s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }
        .core-inner {
            width: 140px;
            height: 140px;
            border: 2px solid #0088cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            letter-spacing: 2px;
        }
        @keyframes rotar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #subtitulo {
            margin-top: 20px;
            font-size: 0.9em;
            color: #0088cc;
        }
    </style>
</head>
<body>

    <div class="core" id="bastian-core">
        <div class="core-inner">BASTIAN</div>
    </div>
    <div id="subtitulo">TOCA LA PANTALLA PARA INICIAR...</div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-EC';
            
            document.body.addEventListener('click', () => {
                document.getElementById('subtitulo').innerText = "ESCUCHANDO...";
                recognition.start();
            });

            recognition.onresult = (event) => {
                const voz = event.results[0][0].transcript.toLowerCase();
                document.getElementById('subtitulo').innerText = `DIJISTE: "${voz}"`;
                responder(voz);
            };
        } else {
            document.getElementById('subtitulo').innerText = "TU NAVEGADOR NO SOPORTA VOZ.";
        }

        function responder(mensaje) {
            const synth = window.speechSynthesis;
            let respuesta = new SpeechSynthesisUtterance();
            
            if (mensaje.includes('bastian')) {
                respuesta.text = "Sistemas en línea. Estoy listo en su dispositivo móvil, señor.";
            } else {
                respuesta.text = "Comando recibido, pero necesito conexión al servidor central.";
            }
            
            respuesta.lang = 'es-ES';
            synth.speak(respuesta);
        }
    </script>
</body>
</html>
